services:
  - type: worker
    name: pdf-converter-telegram-bot
    runtime: python
    plan: starter
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    autoDeploy: true
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ILOVEPDF_PUBLIC_KEY
        sync: false
      - key: ILOVEPDF_SECRET_KEY
        sync: false
      - key: MAX_FILE_MB
        value: "20"
      - key: MAX_CONCURRENT_JOBS
        value: "2"
      - key: CONVERSION_TIMEOUT_SECONDS
        value: "120"
      - key: DAILY_CONVERSIONS_PER_USER
        value: "20"
